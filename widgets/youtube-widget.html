<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard K-S — YouTube Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c8a03c;
    --gold-dim: rgba(200,160,60,0.3);
    --gold-text: #e8d9b0;
    --text-dim: #6b5f3f;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    height: 100%;
  }
  body {
    height: 100%;
    background: transparent;
    font-family: var(--mono);
    padding: 0;
    margin: 0;
  }
  .yt-card {
    width: 100%;
    height: 100%;
    border-radius: 18px;
    padding: 18px 20px;
    position: relative;
    border: 1px solid var(--gold-dim);
    background: var(--card-bg, radial-gradient(ellipse at 0% 0%, #c89820 0%, #6a4a00 30%, #1a1000 60%, #000000 100%));
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .yt-card::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .yt-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .yt-label {
    font-size: 9px; letter-spacing: 3px; color: #f0d890;
    text-transform: uppercase; font-family: var(--sans);
    font-weight: 600; text-shadow: 0 0 8px rgba(240,216,80,0.4);
  }
  .yt-header-actions { display: flex; gap: 8px; align-items: center; }
  .yt-restore {
    font-size: 8px; color: var(--gold-text); opacity: 0.65; letter-spacing: 1px;
    background: transparent; border: none; cursor: pointer;
    font-family: var(--mono); transition: color 0.15s;
  }
  .yt-restore:hover { color: var(--gold); }
  .yt-add-ch-btn {
    font-size: 8px; color: var(--gold-text); opacity: 0.75; letter-spacing: 1px;
    background: transparent; border: 1px solid rgba(200,160,60,0.35);
    cursor: pointer; font-family: var(--mono);
    padding: 2px 8px; border-radius: 4px; transition: all 0.15s;
  }
  .yt-add-ch-btn:hover { border-color: var(--gold); color: var(--gold); }
  .yt-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(200,160,60,0.2) transparent;
  }
  .yt-channel-row {
    margin-bottom: 4px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(200,160,60,0.08);
    transition: border-color 0.15s;
  }
  .yt-channel-row.open { border-color: rgba(200,160,60,0.2); }
  .yt-channel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 8px;
  }
  .yt-channel-header:hover { background: rgba(200,160,60,0.05); }
  .yt-channel-row.open .yt-channel-header { border-radius: 8px 8px 0 0; background: rgba(200,160,60,0.06); }
  .yt-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(200,160,60,0.15);
    border: 1px solid rgba(200,160,60,0.3);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--sans); font-size: 11px; font-weight: 700;
    color: var(--gold); flex-shrink: 0;
  }
  .yt-channel-name {
    flex: 1;
    font-family: var(--sans); font-size: 12px; font-weight: 600;
    color: var(--gold-text); letter-spacing: 0.5px;
  }
  .yt-badge {
    background: #ff0000; color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 1px 6px; border-radius: 8px;
    min-width: 18px; text-align: center;
    flex-shrink: 0;
  }
  .yt-chevron {
    font-size: 10px; color: var(--text-dim);
    transition: transform 0.25s; flex-shrink: 0;
  }
  .yt-channel-row.open .yt-chevron { transform: rotate(90deg); }
  .yt-ch-del {
    background: transparent; border: none;
    color: rgba(200,160,60,0.2); font-size: 10px;
    cursor: pointer; padding: 2px 3px; flex-shrink: 0;
    transition: color 0.15s; border-radius: 3px;
  }
  .yt-ch-del:hover { color: #c04040; }
  .yt-videos {
    display: none;
    padding: 4px 0 6px 0;
    border-top: 1px solid rgba(200,160,60,0.08);
  }
  .yt-channel-row.open .yt-videos { display: block; }
  .yt-video-item {
    display: flex;
    gap: 8px;
    padding: 6px 10px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    border-radius: 4px;
    margin: 0 4px;
  }
  .yt-video-item:hover { background: rgba(200,160,60,0.06); }
  .yt-thumb {
    width: 80px; height: 48px;
    border-radius: 4px; overflow: hidden;
    background: rgba(200,160,60,0.08);
    flex-shrink: 0; position: relative;
  }
  .yt-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .yt-thumb-ph {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; opacity: 0.3; color: var(--gold);
  }
  .yt-play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s;
    background: rgba(0,0,0,0.3);
  }
  .yt-video-item:hover .yt-play-overlay { opacity: 1; }
  .yt-play-overlay::after { content: '▶'; font-size: 14px; color: #fff; }
  .yt-video-info { flex: 1; min-width: 0; }
  .yt-video-title {
    font-size: 10px; color: var(--gold-text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 2px;
  }
  .yt-video-item:hover .yt-video-title { color: var(--gold); }
  .yt-video-date { font-size: 8px; color: var(--gold-text); opacity: 0.5; letter-spacing: 1px; }
  .yt-video-dismiss {
    position: absolute; top: 4px; right: 6px;
    background: transparent; border: none;
    color: rgba(200,160,60,0.2); font-size: 10px;
    cursor: pointer; padding: 2px 4px; border-radius: 3px;
    opacity: 0; transition: all 0.15s;
  }
  .yt-video-item:hover .yt-video-dismiss { opacity: 1; }
  .yt-video-dismiss:hover { color: #c04040; background: rgba(192,64,64,0.1); }
  .yt-no-videos { font-size: 9px; color: var(--gold-text); opacity: 0.45; padding: 6px 10px; letter-spacing: 1px; }
  .yt-add-form {
    display: none; flex-shrink: 0;
    border-top: 1px solid rgba(200,160,60,0.1);
    padding-top: 10px; margin-top: 6px;
    flex-direction: column; gap: 6px;
  }
  .yt-add-form.open { display: flex; }
  .yt-add-hint { font-size: 8px; color: var(--text-dim); letter-spacing: 1px; }
  .yt-add-row { display: flex; gap: 6px; align-items: center; }
  .yt-add-input {
    flex: 1; background: transparent;
    border: none; border-bottom: 1px solid rgba(200,160,60,0.2);
    color: var(--gold-text); font-family: var(--mono); font-size: 9px;
    padding: 3px 4px; outline: none; transition: border-color 0.2s;
  }
  .yt-add-input:focus { border-color: var(--gold); }
  .yt-add-input::placeholder { color: var(--text-dim); }
  .yt-add-name-inp {
    width: 90px; background: transparent;
    border: none; border-bottom: 1px solid rgba(200,160,60,0.2);
    color: var(--gold-text); font-family: var(--mono); font-size: 9px;
    padding: 3px 4px; outline: none;
  }
  .yt-add-name-inp::placeholder { color: var(--text-dim); }
  .yt-add-ok {
    background: rgba(200,160,60,0.12); border: 1px solid var(--gold-dim);
    color: var(--gold); font-family: var(--mono); font-size: 11px;
    padding: 2px 10px; border-radius: 4px; cursor: pointer;
  }
  .yt-add-ok:hover { background: rgba(200,160,60,0.22); }
  .yt-loading { font-size: 10px; color: var(--gold-text); opacity: 0.45; padding: 16px 0; text-align: center; letter-spacing: 2px; }
</style>
<script src="theme-loader.js"></script>
<script src="lang-loader.js"></script>
</head>
<body>
<div class="yt-card">
  <div class="yt-header">
    <div class="yt-label" data-i18n="youtube.title">YouTube</div>
    <div class="yt-header-actions">
      <button class="yt-restore" id="yt-restore" style="display:none;" data-i18n="youtube.hiddenRestore">↺ skrytá</button>
      <button class="yt-add-ch-btn" id="yt-add-ch-btn" data-i18n="youtube.addChannel">+ kanál</button>
    </div>
  </div>
  <div class="yt-list" id="yt-list"><div class="yt-loading" data-i18n="youtube.loading">// načítám...</div></div>
  <div class="yt-add-form" id="yt-add-form">
    <div class="yt-add-hint" data-i18n="youtube.channelIdOrRss">Channel ID (UCxxxxxx) nebo RSS URL</div>
    <div class="yt-add-row">
      <input class="yt-add-input" id="yt-add-url" placeholder="channel ID nebo RSS URL..." data-i18n-placeholder="youtube.channelIdOrRss">
      <input class="yt-add-name-inp" id="yt-add-name" placeholder="název" data-i18n-placeholder="youtube.namePlaceholder">
      <button class="yt-add-ok" id="yt-add-ok">+</button>
    </div>
  </div>
</div>
<script>
const PROXY='https://kulhavysup.cz/dashboard/ks-proxy.php?url=';
const CH_KEY='ks-yt-channels';
const DISMISS_KEY='ks-yt-dismissed';
const DEFAULT_CHANNELS=[
  {id:'UCLA_DiR1FfKNvjuUpBHmylQ',name:'NASA',initials:'NA'},
];
let channels=[],dismissed=[],chVideos={};
function load(){
  try{channels=JSON.parse(localStorage.getItem(CH_KEY)||'null')||DEFAULT_CHANNELS;}catch{channels=DEFAULT_CHANNELS;}
  try{dismissed=JSON.parse(localStorage.getItem(DISMISS_KEY)||'[]');}catch{dismissed=[];}
}
function saveChannels(){localStorage.setItem(CH_KEY,JSON.stringify(channels));try{localStorage.setItem('ks-mob-youtube',JSON.stringify({count:channels.length}));}catch{}}
function saveDismissed(){localStorage.setItem(DISMISS_KEY,JSON.stringify(dismissed));}
function rssUrl(id){return `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;}
function extractVideoId(url){const m=url.match(/[?&]v=([^&]+)/)||url.match(/youtu\.be\/([^?]+)/);return m?m[1]:null;}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
async function fetchChannel(ch){
  try{
    const res=await fetch(PROXY+encodeURIComponent(rssUrl(ch.id)));
    const data=await res.json();
    if(!data.ok)return[];
    return data.articles.map(a=>({...a,videoId:extractVideoId(a.url),thumb:`https://i.ytimg.com/vi/${extractVideoId(a.url)}/mqdefault.jpg`}));
  }catch{return[];}
}
async function loadAll(){
  document.getElementById('yt-list').innerHTML=`<div class="yt-loading">${ksT('youtube.loading','// načítám...')}</div>`;
  await Promise.all(channels.map(async ch=>{chVideos[ch.id]=await fetchChannel(ch);}));
  render();
}
function render(){
  const list=document.getElementById('yt-list');
  if(!channels.length){list.innerHTML=`<div class="yt-loading">${ksT('youtube.noChannels','// žádné kanály')}</div>`;return;}
  list.innerHTML=channels.map((ch,ci)=>{
    const videos=(chVideos[ch.id]||[]).filter(v=>!dismissed.includes(v.url));
    const count=videos.length;
    const videosHtml=videos.length?videos.map(v=>`
      <div class="yt-video-item">
        <div class="yt-thumb" onclick="window.open('${v.url}','_blank','noopener')">
          ${v.videoId?`<img src="${v.thumb}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\'yt-thumb-ph\\'>▶</div>'">`:'<div class="yt-thumb-ph">▶</div>'}
          <div class="yt-play-overlay"></div>
        </div>
        <div class="yt-video-info" onclick="window.open('${v.url}','_blank','noopener')">
          <div class="yt-video-title">${escHtml(v.title)}</div>
          <div class="yt-video-date">${v.date}</div>
        </div>
        <button class="yt-video-dismiss" data-vurl="${v.url}" title="${ksT('youtube.hideVideo','Skrýt')}">✕</button>
      </div>`).join(''):`<div class="yt-no-videos">${ksT('youtube.noVideos','// žádná nová videa')}</div>`;
    return `<div class="yt-channel-row" id="ch-row-${ci}">
      <div class="yt-channel-header" data-ci="${ci}">
        <div class="yt-avatar">${ch.initials||ch.name.slice(0,2).toUpperCase()}</div>
        <div class="yt-channel-name">${escHtml(ch.name)}</div>
        ${count>0?`<span class="yt-badge">${count}</span>`:''}
        <span class="yt-chevron">▶</span>
        <button class="yt-ch-del" data-ci="${ci}" title="${ksT('youtube.removeChannel','Odebrat')}">✕</button>
      </div>
      <div class="yt-videos">${videosHtml}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('.yt-channel-header').forEach(hdr=>{
    hdr.addEventListener('click',e=>{
      if(e.target.closest('.yt-ch-del'))return;
      document.getElementById('ch-row-'+hdr.dataset.ci).classList.toggle('open');
    });
  });
  list.querySelectorAll('.yt-ch-del').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      channels.splice(parseInt(btn.dataset.ci),1);
      saveChannels();render();
    });
  });
  list.querySelectorAll('.yt-video-dismiss').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const url=btn.dataset.vurl;
      if(!dismissed.includes(url)){dismissed.push(url);saveDismissed();render();}
    });
  });
  document.getElementById('yt-restore').style.display=dismissed.length?'block':'none';
}
document.getElementById('yt-restore').addEventListener('click',()=>{dismissed=[];saveDismissed();render();});
document.getElementById('yt-add-ch-btn').addEventListener('click',()=>{
  document.getElementById('yt-add-form').classList.toggle('open');
});
document.getElementById('yt-add-ok').addEventListener('click',addChannel);
document.getElementById('yt-add-url').addEventListener('keydown',e=>{if(e.key==='Enter')addChannel();});
function addChannel(){
  const urlInput=document.getElementById('yt-add-url');
  const nameInput=document.getElementById('yt-add-name');
  const raw=urlInput.value.trim(),name=nameInput.value.trim();
  if(!raw||!name)return;
  let id='';
  const m=raw.match(/channel_id=([^&]+)/);
  if(m)id=m[1];
  else if(/^UC[A-Za-z0-9_-]{22}$/.test(raw))id=raw;
  else{alert(ksT('youtube.invalidChannelAlert','Vlož Channel ID (začíná UC...) nebo RSS URL'));return;}
  if(channels.some(ch=>ch.id===id)){urlInput.value='';nameInput.value='';return;}
  channels.push({id,name,initials:name.slice(0,2).toUpperCase()});
  urlInput.value='';nameInput.value='';
  document.getElementById('yt-add-form').classList.remove('open');
  saveChannels();
  fetchChannel(channels[channels.length-1]).then(vids=>{
    chVideos[channels[channels.length-1].id]=vids;render();
  });
}
load();try{localStorage.setItem('ks-mob-youtube',JSON.stringify({count:channels.length}));}catch{}loadAll();

// Když se přepne jazyk, překresli texty
window.addEventListener('ks-lang-applied', render);
</script>
</body>
</html>
