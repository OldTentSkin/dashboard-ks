<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard K-S — Hodiny (Solar)</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #ff9020;
    --gold-dim: rgba(255,144,32,0.3);
    --gold-text: #f0d8b0;
    --text-dim: #6b5530;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body { height: 100%; background: transparent; font-family: var(--mono); padding: 0; margin: 0; }

  .sl-card {
    width: 100%; height: 100%;
    border-radius: 18px;
    position: relative;
    border: 1px solid var(--gold-dim);
    background: var(--card-bg, radial-gradient(ellipse at 0% 0%, #e08020 0%, #7a3a00 30%, #1f0d00 60%, #000000 100%));
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px;
    container-type: size;
  }
  .sl-card::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    z-index: 2;
  }

  .sl-label {
    position: absolute; top: 12px; left: 18px;
    font-size: 9px; letter-spacing: 3px; color: var(--gold-text);
    text-transform: uppercase; font-family: var(--sans);
    font-weight: 600; text-shadow: 0 0 8px rgba(255,144,32,0.5);
    z-index: 3;
  }

  .sl-content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; max-height: 100%; min-height: 0;
  }

  canvas#sl-dial {
    display: block;
    width: auto;
    height: 100%;
    max-height: min(60cqh, 175px);
    max-width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: contain;
  }

  .sl-time {
    font-family: var(--mono);
    font-size: clamp(20px, 9cqw, 28px);
    font-weight: 700;
    color: #ffe0a0;
    text-shadow: 0 0 10px rgba(255,144,32,0.85), 0 0 22px rgba(255,144,32,0.45);
    letter-spacing: 3px;
  }
  .sl-date {
    font-size: 9px;
    color: var(--gold-text);
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="sl-card">
  <div class="sl-label">Hodiny</div>
  <div class="sl-content">
    <canvas id="sl-dial" width="220" height="220"></canvas>
    <div class="sl-time" id="sl-time">--:--:--</div>
    <div class="sl-date" id="sl-date">—</div>
  </div>
</div>

<script src="theme-loader.js"></script>
<script>
const DAYS = ['neděle','pondělí','úterý','středa','čtvrtek','pátek','sobota'];
const MONTHS = ['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];
const HOUR_LABELS = ['VI','VII','VIII','IX','X','XI','XII','I','II','III','IV','V']; // 6 ráno → 17 odpoledne na ciferníku

const canvas = document.getElementById('sl-dial');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W/2, CY = H/2, R = 95;

function draw() {
  ctx.clearRect(0, 0, W, H);
  const now = new Date();
  const h = now.getHours(), m = now.getMinutes();
  const dayProgress = ((h % 12) + m/60) / 12;
  const sunA = dayProgress * Math.PI*2 - Math.PI/2;

  // ── Denní/noční síla světla (0 = tma, 1 = plné slunce) ──
  const tHour = h + m/60;
  let lightStrength;
  if (tHour < 5.5 || tHour > 20.5) lightStrength = 0;
  else if (tHour < 9)  lightStrength = (tHour - 5.5) / 3.5;
  else if (tHour < 16) lightStrength = 1;
  else if (tHour < 20.5) lightStrength = 1 - (tHour - 16) / 4.5;
  else lightStrength = 0;
  lightStrength = Math.max(0, Math.min(1, lightStrength));

  // ── Putující sluneční svit po ploše ciferníku (jen ve dne) ──
  if (lightStrength > 0.01) {
    const lightX = CX + R * 0.7 * Math.cos(sunA);
    const lightY = CY + R * 0.7 * Math.sin(sunA);
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2); ctx.clip();
    const lightGrad = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, R * 1.3);
    lightGrad.addColorStop(0,   `rgba(255,200,110,${0.4 * lightStrength})`);
    lightGrad.addColorStop(0.45,`rgba(255,150,40,${0.14 * lightStrength})`);
    lightGrad.addColorStop(1,   'rgba(255,150,40,0)');
    ctx.fillStyle = lightGrad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  // ── V noci — studený měsíční nádech ──
  if (lightStrength < 0.99) {
    const nightStrength = 1 - lightStrength;
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle = `rgba(10,15,35,${0.45 * nightStrength})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ── Vnější mosazný kruh ──
  ctx.save();
  const ringGrad = ctx.createRadialGradient(CX, CY, R-10, CX, CY, R+6);
  ringGrad.addColorStop(0, 'rgba(255,144,32,0.05)');
  ringGrad.addColorStop(0.85, 'rgba(255,180,80,0.35)');
  ringGrad.addColorStop(1, 'rgba(120,60,0,0.6)');
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI*2);
  ctx.lineWidth = 5; ctx.strokeStyle = ringGrad;
  ctx.shadowColor = 'rgba(255,144,32,0.5)'; ctx.shadowBlur = 10;
  ctx.stroke();
  ctx.restore();

  // ── Číselník — 12 hodinových ryskek + popisky ──
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI/2;
    const rOuter = R - 6, rInner = i % 3 === 0 ? R - 16 : R - 11;
    const x1 = CX + rOuter*Math.cos(a), y1 = CY + rOuter*Math.sin(a);
    const x2 = CX + rInner*Math.cos(a), y2 = CY + rInner*Math.sin(a);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
    ctx.strokeStyle = i % 3 === 0 ? 'rgba(255,200,120,0.8)' : 'rgba(255,180,80,0.35)';
    ctx.lineWidth = i % 3 === 0 ? 2 : 1;
    ctx.stroke();

    const lx = CX + (R-26)*Math.cos(a), ly = CY + (R-26)*Math.sin(a);
    ctx.font = '9px Georgia, serif';
    ctx.fillStyle = 'rgba(255,210,150,0.55)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(HOUR_LABELS[i], lx, ly);
  }

  // (sluníčko nahrazeno putujícím svitem výše)

  // ── Gnomon (trojúhelníkový hrot uprostřed) ──
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(CX, CY - 34);
  ctx.lineTo(CX - 7, CY + 4);
  ctx.lineTo(CX + 7, CY + 4);
  ctx.closePath();
  const gnomonGrad = ctx.createLinearGradient(CX, CY-34, CX, CY+4);
  gnomonGrad.addColorStop(0, '#3a2008');
  gnomonGrad.addColorStop(1, '#7a4010');
  ctx.fillStyle = gnomonGrad;
  ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
  ctx.fill();
  ctx.restore();

  // ── Stín gnomonu — opačný směr od světla, v noci slábne k nule ──
  if (lightStrength > 0.02) {
    const shadowA = sunA + Math.PI;
    const shadowLen = R - 28;
    const sx = CX + shadowLen*Math.cos(shadowA), sy = CY + shadowLen*Math.sin(shadowA);
    ctx.save();
    const shadowGrad = ctx.createLinearGradient(CX, CY, sx, sy);
    shadowGrad.addColorStop(0, `rgba(20,8,0,${0.85 * lightStrength})`);
    shadowGrad.addColorStop(1, 'rgba(20,8,0,0)');
    ctx.beginPath();
    ctx.moveTo(CX - 5, CY);
    ctx.lineTo(CX + 5, CY);
    ctx.lineTo(sx + 6*Math.cos(shadowA+Math.PI/2), sy + 6*Math.sin(shadowA+Math.PI/2));
    ctx.lineTo(sx - 6*Math.cos(shadowA+Math.PI/2), sy - 6*Math.sin(shadowA+Math.PI/2));
    ctx.closePath();
    ctx.fillStyle = shadowGrad;
    ctx.fill();
    ctx.restore();
  }

  // ── Středový kolíček ──
  ctx.beginPath(); ctx.arc(CX, CY, 3, 0, Math.PI*2);
  ctx.fillStyle = '#2a1505';
  ctx.fill();
}

function tick() {
  const now = new Date();
  document.getElementById('sl-time').textContent =
    String(now.getHours()).padStart(2,'0') + ':' +
    String(now.getMinutes()).padStart(2,'0') + ':' +
    String(now.getSeconds()).padStart(2,'0');
  document.getElementById('sl-date').textContent =
    `${DAYS[now.getDay()]}, ${now.getDate()}. ${MONTHS[now.getMonth()]}`;
  draw();
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
